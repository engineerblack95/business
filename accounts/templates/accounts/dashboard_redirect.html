{% extends 'base.html' %}
{% load static %}

{% block title %}Redirecting... - HerosTechnology{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card text-center">
                <div class="card-body py-5">
                    <i class="fas fa-spinner fa-spin fa-3x text-primary mb-3"></i>
                    <h4>Redirecting to your dashboard...</h4>
                    <p class="text-muted">Please wait while we take you to your personalized dashboard.</p>
                    <div class="mt-3">
                        <a href="{% url 'dashboard:home' %}" class="btn btn-primary">
                            <i class="fas fa-tachometer-alt"></i> Go to Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Auto-redirect after 2 seconds
    setTimeout(function() {
        window.location.href = "{% url 'dashboard:home' %}";
    }, 2000);
</script>
{% endblock %}
