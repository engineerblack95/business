{% extends 'base.html' %}
{% load static %}

{% block title %}Logged Out - HerosTechnology{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card text-center">
                <div class="card-body py-5">
                    <i class="fas fa-sign-out-alt fa-4x text-primary mb-3"></i>
                    <h3>You have been logged out</h3>
                    <p class="text-muted">Thank you for using HerosTechnology.</p>
                    <hr>
                    <div class="mt-3">
                        <a href="{% url 'accounts:login' %}" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt"></i> Login Again
                        </a>
                        <a href="{% url 'home' %}" class="btn btn-outline-secondary">
                            <i class="fas fa-home"></i> Go to Homepage
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
